<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Iset Alpha Farms</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
            background: var(--bg-body);
        }
        .admin-sidebar {
            width: 250px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .admin-brand {
            padding: 0 20px 20px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .admin-nav {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .admin-nav li a {
            display: block;
            padding: 15px 20px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        .admin-nav li a:hover, .admin-nav li a.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }
        .admin-nav li a i {
            width: 25px;
        }
        .admin-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-header h1 {
            font-size: 1.75rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-surface);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .data-table th, .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th {
            background: rgba(0,0,0,0.02);
            font-weight: 600;
            color: var(--text-muted);
        }
        [data-theme="dark"] .data-table th {
            background: rgba(255,255,255,0.02);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #fef3c7;
            color: #d97706;
        }
        .status-badge.completed {
            background: #d1fae5;
            color: #059669;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .order-items-list {
            margin: 0;
            padding-left: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <i class="fas fa-leaf"></i> Iset Alpha Admin
            </div>
            <ul class="admin-nav">
                <li><a href="#" class="tab-link active" data-tab="orders"><i class="fas fa-shopping-bag"></i> Orders</a></li>
                <li><a href="#" class="tab-link" data-tab="contacts"><i class="fas fa-envelope"></i> Messages</a></li>
                <li><a href="#" class="tab-link" data-tab="subscribers"><i class="fas fa-users"></i> Subscribers</a></li>
                <li><a href="/"><i class="fas fa-arrow-left"></i> Back to Site</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1 id="page-title">Manage Orders</h1>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>

            <!-- Orders Tab -->
            <div id="orders" class="tab-content active">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Contact</th>
                            <th>Address</th>
                            <th>Items</th>
                            <th>Total (₦)</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <tr><td colspan="8">Loading orders...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Contacts Tab -->
            <div id="contacts" class="tab-content">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="contacts-tbody">
                        <tr><td colspan="5">Loading messages...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Subscribers Tab -->
            <div id="subscribers" class="tab-content">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email Address</th>
                            <th>Date Subscribed</th>
                        </tr>
                    </thead>
                    <tbody id="subscribers-tbody">
                        <tr><td colspan="3">Loading subscribers...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/admin.js"></script>
</body>
</html>
